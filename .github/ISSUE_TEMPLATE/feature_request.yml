name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Suggest focused improvements that fit Laravel event sourcing and audit event log persistence.
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: package-scope
    attributes:
      label: Package scope fit
      description: Explain how this fits MongoDB-backed event/audit persistence without adding app-specific behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: bc-impact
    attributes:
      label: Backward compatibility impact
    validations:
      required: true
  - type: textarea
    id: docs-testing
    attributes:
      label: Documentation and testing expectations
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I checked existing issues and documentation before requesting this.
          required: true
        - label: I understand maintainers may reject changes that create unnecessary scope creep.
          required: true
        - label: This request is not for dashboards, analytics UI, AI runtime, or unrelated app features.
          required: true
