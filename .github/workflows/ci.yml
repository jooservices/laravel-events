name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.5'
  MONGODB_URI: mongodb://127.0.0.1:27017
  MONGODB_DATABASE: laravel_events_test
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json, mongodb
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Run Composer Audit
        run: composer audit

  lint:
    name: Lint - ${{ matrix.tool.name }}
    runs-on: ubuntu-latest
    needs: [security]
    strategy:
      fail-fast: false
      matrix:
        tool:
          - name: Pint
            command: lint:pint
          - name: PHPCS
            command: lint:phpcs
          - name: PHPStan
            command: lint:phpstan
          - name: PHPMD
            command: lint:phpmd
          - name: PHP-CS-Fixer
            command: lint:cs
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json, mongodb
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4

      - name: Run ${{ matrix.tool.name }}
        run: composer ${{ matrix.tool.command }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: [security]
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json, mongodb
          coverage: pcov

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4

      - name: Run tests with coverage
        run: composer test:coverage

      - name: Check coverage threshold
        run: |
          php -r '
          $xml = simplexml_load_file("build/coverage/clover.xml");
          $metrics = $xml->project->metrics;
          $statements = (int) $metrics["statements"];
          $covered = (int) $metrics["coveredstatements"];
          $percent = $statements > 0 ? round(($covered / $statements) * 100, 2) : 0.0;
          echo "Code coverage: {$percent}%\n";
          if ($percent < 80) {
              fwrite(STDERR, "Code coverage {$percent}% is below minimum threshold of 80%\n");
              exit(1);
          }
          '

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./build/coverage/clover.xml
          flags: unittests
          name: laravel-events
          fail_ci_if_error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            build/coverage/
          retention-days: 30

  sonarcloud:
    name: SonarQube Cloud Analysis
    runs-on: ubuntu-latest
    needs: [tests]
    if: >-
      needs.tests.result == 'success' &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    steps:
      - name: Checkout code
        if: env.SONAR_TOKEN != ''
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        if: env.SONAR_TOKEN != ''
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: build/coverage

      - name: Skip SonarQube Cloud Scan
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN is not configured; skipping optional SonarQube Cloud analysis."

      - name: SonarQube Cloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
