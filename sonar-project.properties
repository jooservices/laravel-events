# SonarCloud Configuration
sonar.projectKey=jooservices_laravel-events
sonar.organization=jooservices

# Project information
sonar.projectName=JOOservices Laravel Events

# Source and test directories
sonar.sources=src
sonar.tests=tests

# PHP specific settings
sonar.php.version=8.5

# Coverage settings
sonar.php.coverage.reportPaths=build/coverage/clover.xml
sonar.coverage.exclusions=tests/**/*

# Exclusions
sonar.exclusions=vendor/**/*,tests/**/*,.php-cs-fixer.cache

# Test exclusions
sonar.test.exclusions=tests/**/*

# Code quality settings
sonar.sourceEncoding=UTF-8
